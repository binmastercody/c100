<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- interactive-widget: Chrome/Android — page resizes with URL bar instead of overlapping content -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
    <!-- Tint browser chrome (Android Chrome, some iOS) — cannot fully hide URL bar in a normal tab -->
    <meta name="theme-color" content="#667eea" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#312e81" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BinMaster C-100 Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .main-content {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            box-sizing: border-box;
            position: relative;
            z-index: 10003; /* Above tutorial overlays so device buttons stay clickable */
        }

        .home-page {
            background: #ffffff;
            border-radius: 20px;
            padding: 32px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .home-page h1 {
            color: #764ba2;
            margin-bottom: 12px;
            font-size: 28px;
        }

        .home-page p {
            color: #555;
            margin-bottom: 24px;
            font-size: 15px;
            line-height: 1.6;
        }
        .tutorial-tooltip {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(102, 126, 234, 0.98);
            color: #ffffff;
            padding: 14px 16px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            z-index: 10000;
            width: min(360px, calc(100% - 32px));
            transition: opacity 0.2s ease;
            pointer-events: none; /* Never block clicks (e.g. device selection) */
        }

        .tutorial-tooltip.tutorial-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .tutorial-tooltip h3 {
            margin: 0 0 6px;
            font-size: 15px;
        }

        .tutorial-tooltip p {
            margin: 0 0 10px;
            font-size: 13px;
            line-height: 1.5;
        }

        .tutorial-tooltip .tutorial-step {
            font-size: 12px;
            opacity: 0.85;
            margin-bottom: 6px;
        }

        .tutorial-tooltip .tutorial-actions {
            display: flex;
            justify-content: flex-end;
        }

        .tutorial-tooltip button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 12px;
            pointer-events: auto; /* Remain clickable despite parent's pointer-events: none */
        }

        .tutorial-pointer {
            position: fixed;
            font-size: 32px;
            color: #3b82f6;
            z-index: 10002;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
        }

        .tutorial-pointer.tutorial-hidden {
            opacity: 0;
        }

        .tutorial-pointer-circle {
            position: fixed;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid #d82a27;
            background: rgba(216, 42, 39, 0.15);
            z-index: 10001;
            pointer-events: none;
            box-shadow: 0 0 0 2px rgba(216, 42, 39, 0.3);
        }

        .tutorial-pointer-circle.tutorial-hidden {
            opacity: 0;
        }

        .tutorial-highlight {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
            border-radius: 6px;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
        }

        .device-type-selection {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .device-btn {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: #ffffff;
            border: none;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .device-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        }

        .device-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .hidden {
            display: none !important;
        }

        .console-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Portrait mobile: stacked layout in CSS. Landscape mobile: zoom via fitC100ConsoleScale(). */
        .c100-console-viewport {
            width: 100%;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            box-sizing: border-box;
            overflow: visible;
            /* Do NOT use line-height: 0 here — it inherits into .brand and collapses .smartbob / .model text */
            line-height: normal;
        }
        .c100-console-scaled {
            display: block;
            line-height: normal;
        }

        .console-container {
            background-color: #d4d4d4; /* Light gray outer casing */
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            width: 480px;
            position: relative;
        }

        /* Screw heads in corners */
        .console-container::before,
        .console-container::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle, #888 0%, #666 50%, #888 100%);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .console-container::before {
            top: 8px;
            left: 8px;
        }

        .console-container::after {
            top: 8px;
            right: 8px;
        }

        .screw-bottom-left,
        .screw-bottom-right {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle, #888 0%, #666 50%, #888 100%);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
            bottom: 8px;
        }

        .screw-bottom-left {
            left: 8px;
        }

        .screw-bottom-right {
            right: 8px;
        }

        .display-area {
            background-color: #1a1a1a; /* Deep black recessed panel */
            border: 2px solid #cc0000; /* Bright red border from image */
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-radius: 6px;
            gap: 16px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .screen {
            background-color: #e8e8e8; /* Light gray screen background */
            color: #000000;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 6px;
            height: 112px; /* Exactly fits: 6px padding top + 20px title + 4px margin + 72px (3 items) + 6px padding bottom = 108px content + 4px border = 112px total */
            width: 260px;
            border: 2px solid #000;
            border-radius: 4px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
        }

        .menu-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 14px;
            text-decoration: underline;
            flex-shrink: 0;
            padding-bottom: 2px;
            border-bottom: 1px solid #000;
            line-height: 1.2;
            height: 20px; /* Fixed height for title */
        }

        .menu-items-container {
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 72px; /* Exactly 3 items * 24px */
            flex-shrink: 0;
        }

        .menu-items-viewport {
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.2s ease;
        }

        .menu-item {
            padding: 2px 4px;
            cursor: default;
            height: 24px; /* Fixed height per item - exactly 3 fit */
            display: flex;
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 24px;
            box-sizing: border-box;
        }

        .selected {
            background-color: #000000;
            color: #ffffff;
            font-weight: bold;
        }

        .input-value {
            font-size: 20px;
            text-align: center;
            margin: 8px 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .input-cursor {
            background-color: #000000;
            color: #ffffff;
            padding: 0 2px;
            border-radius: 2px;
        }

        /* --- Overall Keypad and Background --- */
        .keypad {
            display: grid;
            grid-template-columns: repeat(2, 44px);
            grid-template-rows: repeat(4, 44px);
            gap: 8px 6px; /* Slightly more space between rows and columns */
            width: fit-content;
            background-color: #f8f8f8; /* Off-white background area */
            padding: 24px 18px;
            border-radius: 40px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
            align-items: center;
            justify-items: center;
        }

        /* --- Base Key Styling --- */
        .key {
            background-color: #222222; 
            color: #ffffff; 
            border: none;
            padding: 0;
            font-size: 18px; 
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 3px 0 #000, 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
        }

        .key:active {
            box-shadow: 0 1px 0 #000, 0 1px 2px rgba(0, 0, 0, 0.4);
            transform: translateY(2px);
        }

        .key:hover {
            background-color: #333333; 
        }

        /* --- D-Pad Button Placement --- */
        .key.up { 
            grid-area: 1 / 1 / 2 / 3;
            font-size: 24px;
        }
        .key.left { 
            grid-area: 2 / 1 / 3 / 2;
            font-size: 24px;
        }
        .key.right { 
            grid-area: 2 / 2 / 3 / 3;
            font-size: 24px;
        }
        .key.down { 
            grid-area: 3 / 1 / 4 / 3;
            font-size: 24px;
        }

        /* --- Function Keys (X and Check) --- */
        .key.x-mark { 
            grid-area: 4 / 1 / 5 / 2; 
            font-size: 22px;
            margin-top: 14px; /* Maintain the group separation */
        }
        .key.check-mark { 
            grid-area: 4 / 2 / 5 / 3;
            font-size: 22px;
            margin-top: 14px; /* Maintain the group separation */
        }

        .screen-and-brand {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .brand {
            background-color: #e8e8e8; /* Light gray branding area */
            padding: 10px 12px;
            border-radius: 4px;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .binmaster {
            color: #cc0000;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 0px;
            font-family: Arial, sans-serif;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .binmaster .bin {
            font-size: 22px;
            letter-spacing: -1px;
        }

        .binmaster .master {
            font-size: 20px;
            letter-spacing: 0px;
        }

        .binmaster .registered {
            font-size: 10px;
            vertical-align: super;
            margin-left: 2px;
        }

        .smartbob {
            font-size: 12px;
            font-weight: 600;
            color: #000;
            margin-bottom: 2px;
        }
        .smartbob-short {
            display: none;
        }

        .model {
            font-size: 11px;
            color: #333;
        }

        /* --- Tutorial complete: BinDisc-style celebration (rings + sparkles + bouncy device) --- */
        @keyframes c100-tc-badge-pop {
            0% { opacity: 0; transform: scale(0.4); }
            55% { opacity: 1; transform: scale(1.12); }
            75% { transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes c100-tc-check-in {
            0% { opacity: 0; transform: scale(0.35) rotate(-18deg); }
            70% { opacity: 1; transform: scale(1.15) rotate(4deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes c100-tc-pulse-ring {
            0% {
                transform: scale(0.55);
                opacity: 0.85;
            }
            100% {
                transform: scale(2.35);
                opacity: 0;
            }
        }
        @keyframes c100-tc-headline-in {
            0% { opacity: 0; transform: translateY(18px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes c100-tc-preview-fade {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        @keyframes c100-tc-device-bindisc {
            0% {
                opacity: 0;
                transform: translateY(36px) scale(0.82);
                filter: blur(6px);
            }
            50% {
                opacity: 1;
                filter: blur(0);
            }
            68% {
                transform: translateY(-8px) scale(1.04);
            }
            82% {
                transform: translateY(4px) scale(0.99);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
        @keyframes c100-tc-sparkle {
            0% {
                opacity: 0;
                transform: scale(0) rotate(0deg);
            }
            40% {
                opacity: 1;
                transform: scale(1) rotate(120deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.4) rotate(260deg);
            }
        }
        @keyframes c100-tc-slide-up {
            from {
                transform: translateY(22px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes c100-tc-btn-glow {
            0%,
            100% {
                box-shadow:
                    0 1px 0 rgba(255, 255, 255, 0.15) inset,
                    0 8px 24px rgba(79, 70, 229, 0.45),
                    0 2px 6px rgba(0, 0, 0, 0.2);
            }
            50% {
                box-shadow:
                    0 1px 0 rgba(255, 255, 255, 0.2) inset,
                    0 10px 36px rgba(129, 140, 248, 0.65),
                    0 4px 14px rgba(79, 70, 229, 0.5);
            }
        }

        /*
         * Important: do NOT fade the overlay with opacity — it multiplies with child animations
         * and makes the entrance look like an instant “jump.” Visibility = display only.
         */
        .c100-tutorial-complete {
            position: fixed;
            inset: 0;
            z-index: 10050;
            display: none;
            overflow: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            font-family: "DM Sans", system-ui, -apple-system, Segoe UI, sans-serif;
            background:
                radial-gradient(ellipse 120% 80% at 50% 0%, rgba(99, 102, 241, 0.22) 0%, transparent 55%),
                radial-gradient(ellipse 90% 60% at 100% 100%, rgba(167, 139, 250, 0.18) 0%, transparent 50%),
                linear-gradient(168deg, #0f172a 0%, #1e1b4b 38%, #172554 72%, #0c1222 100%);
            box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.35);
            opacity: 1;
            pointer-events: none;
        }
        .c100-tutorial-complete.c100-tutorial-complete--visible {
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        .c100-tutorial-complete__inner {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: clamp(24px, 5vh, 40px) clamp(18px, 5vw, 32px) clamp(28px, 6vh, 48px);
            max-width: min(420px, 100%);
            width: 100%;
            box-sizing: border-box;
        }
        .c100-tutorial-complete__success-mark {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: clamp(18px, 3.5vh, 26px);
            min-height: 76px;
        }
        .c100-tutorial-complete__pulse-rings {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 76px;
            height: 76px;
            margin: -38px 0 0 -38px;
            pointer-events: none;
            z-index: 0;
        }
        .c100-tutorial-complete__pulse-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(52, 211, 153, 0.55);
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.35);
            opacity: 0;
            will-change: transform, opacity;
        }
        .c100-tutorial-complete__check-badge {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #34d399 0%, #059669 55%, #047857 100%);
            color: #ffffff;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.2) inset,
                0 12px 40px rgba(16, 185, 129, 0.45),
                0 4px 12px rgba(0, 0, 0, 0.25);
            opacity: 0;
            position: relative;
            z-index: 1;
        }
        .c100-tutorial-complete__check-svg {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            display: block;
            overflow: visible;
            opacity: 0;
            transform-origin: center center;
        }
        .c100-tutorial-complete__check-path {
            fill: currentColor;
        }
        .c100-tutorial-complete__title {
            font-family: "Outfit", "DM Sans", system-ui, sans-serif;
            font-size: clamp(26px, 5vw, 36px);
            font-weight: 700;
            color: #f8fafc;
            margin: 0 0 12px;
            letter-spacing: -0.02em;
            line-height: 1.15;
            opacity: 0;
        }
        .c100-tutorial-complete__subcopy {
            font-size: clamp(15px, 3.2vw, 17px);
            font-weight: 500;
            color: rgba(226, 232, 240, 0.88);
            margin: 0 0 clamp(22px, 4vh, 30px);
            line-height: 1.6;
            opacity: 0;
        }
        .c100-tutorial-complete__subcopy-line {
            margin: 0 0 8px;
        }
        .c100-tutorial-complete__subcopy-line:last-child {
            margin-bottom: 0;
        }
        /*
         * Completion overlay: same markup + classes as #console-root so global C-100 CSS applies 1:1.
         * Does not change #console-root. Uses .c100-tutorial-complete__mini-viewport (not .c100-console-viewport)
         * so body:has(.c100-console-viewport:not(.hidden)) is unaffected when the overlay is open.
         */
        .c100-tutorial-complete__console-preview {
            opacity: 0;
            margin: 0 auto clamp(22px, 4vh, 32px);
            width: 100%;
            max-width: min(340px, 100%);
            box-sizing: border-box;
            line-height: normal;
            position: relative;
        }
        .c100-tutorial-complete__sparkles {
            position: absolute;
            left: 50%;
            top: 42%;
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: 2;
        }
        .c100-tutorial-complete__sparkles span {
            position: absolute;
            width: 7px;
            height: 7px;
            margin: -3.5px 0 0 -3.5px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, rgba(255, 255, 255, 0) 70%);
            box-shadow: 0 0 10px rgba(167, 139, 250, 0.95);
            opacity: 0;
            will-change: transform, opacity;
        }
        .c100-tutorial-complete__sparkles span:nth-child(1) {
            left: -62px;
            top: -18px;
        }
        .c100-tutorial-complete__sparkles span:nth-child(2) {
            left: 58px;
            top: -28px;
        }
        .c100-tutorial-complete__sparkles span:nth-child(3) {
            left: -48px;
            top: 32px;
        }
        .c100-tutorial-complete__sparkles span:nth-child(4) {
            left: 52px;
            top: 38px;
        }
        .c100-tutorial-complete__sparkles span:nth-child(5) {
            left: 0;
            top: -52px;
        }
        .c100-tutorial-complete__mini-viewport {
            width: 100%;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            box-sizing: border-box;
            overflow: visible;
            line-height: normal;
        }
        @media (max-width: 540px) {
            .c100-tutorial-complete__mini-viewport {
                max-width: min(320px, calc(100vw - 24px));
            }
        }
        .c100-tutorial-complete__live-replica {
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
        }
        .c100-tutorial-complete__live-replica .key {
            cursor: default;
        }
        .c100-tutorial-complete__mini-scale-wrap {
            --c100-mini-scale: 0.36;
            width: calc(480px * var(--c100-mini-scale));
            margin: 0 auto;
            position: relative;
            overflow: visible;
            z-index: 1;
            opacity: 0;
        }
        .c100-tutorial-complete__mini-scale-inner {
            position: absolute;
            left: 50%;
            top: 0;
            width: 480px;
            margin-left: -240px;
            transform: scale(var(--c100-mini-scale));
            transform-origin: top center;
            pointer-events: none;
            -webkit-font-smoothing: antialiased;
        }
        .c100-tutorial-complete__dismiss {
            opacity: 0;
            margin-top: 4px;
            padding: 14px 32px;
            min-width: 200px;
            font-size: 16px;
            font-weight: 600;
            font-family: "DM Sans", system-ui, sans-serif;
            color: #f8fafc;
            background: linear-gradient(180deg, #6366f1 0%, #4f46e5 45%, #4338ca 100%);
            border: none;
            border-radius: 999px;
            cursor: pointer;
            box-shadow:

    // --- FRONT-PAGE DEVICE TYPE SELECTION ---
    let selectedC100Device = null;

    function selectC100Device(deviceType) {

        const mainContent = document.querySelector('.main-content');

        const consoleRoot = document.getElementById('console-root');

        if (mainContent) mainContent.classList.add('hidden');
        if (consoleViewport) consoleViewport.classList.remove('hidden');
        if (consoleRoot) consoleRoot.classList.remove('hidden');

        requestAnimationFrame(() => {
            requestAnimationFrame(() => fitC100ConsoleScale());
        });

        if (!tutorialActive) {
            setTimeout(() => startC100Tutorial(), 100);
        }
    }

    // --- CONSOLE STATE AND NAVIGATION LOGIC ---

    function isMobileBrandingViewport() {
        return typeof window.matchMedia === 'function' && window.matchMedia('(max-width: 540px)').matches;
    }

            type: 'welcome',
            items: function welcomeItems() {
                const line2 = isMobileBrandingViewport() ? 'C-100' : 'SmartBob Console';

            }
        },
        'MAIN_MENU': { type: 'nav', items: ['Measure/View', 'Setup'] },
        
        // --- MEASURE/VIEW BRANCH ---
        'MEASURE_VIEW_NO_SENSORS': { type: 'info', items: ['MEASURE/VIEW Prod', 'No sensors enabled.', 'Go to Add/Remove', 'under the Setup menu.'] },
        'MEASURE_VIEW_PROD': { 
            type: 'nav', 
            items: function() {
                if (enabledSensors.length === 0) {
                    return ['No sensors enabled', 'Go to Add/Remove', 'under the Setup menu.'];
                } else {
                    const items = ['Measure All'];
                    enabledSensors.forEach((sensor) => {

    // Initialize measurement data for a sensor with default values
    function initializeMeasurementData(sensorNum) {
        if (!measurementData[sensorNum]) {
            // Default values based on vessel config
            const bodyHeight = parseFloat(vesselConfig.bodyHeight) || 20.0;
            const hopperHeight = parseFloat(vesselConfig.hopperHeight) || 6.0;
            const totalHeight = bodyHeight + hopperHeight;
            const headroom = 2.59; // Default headroom
            const productHeight = totalHeight - headroom;
            const productPercent = (productHeight / totalHeight) * 100;
            const headroomPercent = (headroom / totalHeight) * 100;
            const density = parseFloat(vesselConfig.productDensity) || 20.0;
            
            // Calculate volumes and weights (simplified circular vessel calculation)
            const radius = parseFloat(vesselConfig.bodyRadius) || 1.0;
            const productVolume = Math.PI * radius * radius * productHeight;
            const headroomVolume = Math.PI * radius * radius * headroom;
            const totalVolume = Math.PI * radius * radius * totalHeight;
            
            measurementData[sensorNum] = {
                product: {
                    percent: productPercent.toFixed(1),
                    feet: productHeight.toFixed(2),
                    weight: (productVolume * density).toFixed(2)
                },
                headroom: {
                    percent: headroomPercent.toFixed(1),
                    feet: headroom.toFixed(2),
                    weight: (headroomVolume * density).toFixed(2)
                },
                capacity: {
                    percent: '100.0',
                    feet: totalHeight.toFixed(2),
                    weight: (totalVolume * density).toFixed(2)
                }
            };
        }
        return measurementData[sensorNum];
    }

    function clearMeasureAllTimers() {
        measureAllTimerIds.forEach((id) => clearTimeout(id));
        measureAllTimerIds = [];
    }
    function scheduleMeasureAllStep(fn, delayMs) {
        const id = setTimeout(fn, delayMs);
        measureAllTimerIds.push(id);
        return id;
    }
    
    // Perform measurement for a single sensor (used by detail view and measure-all)
    function performMeasurement(sensorNum, onComplete) {
        if (isMeasuring && !measureAllInProgress) return;
        
        isMeasuring = true;
        showingMeasuring = !measureAllInProgress;
        
        renderScreen();
        
        measurementTimeout = setTimeout(() => {
            const existingData = measurementData[sensorNum];
            
            // Calculate capacity from vessel config (stays constant)
            const bodyHeight = parseFloat(vesselConfig.bodyHeight) || 20.0;
            const hopperHeight = parseFloat(vesselConfig.hopperHeight) || 6.0;
            const totalHeight = bodyHeight + hopperHeight;
            const density = parseFloat(vesselConfig.productDensity) || 20.0;
            const radius = parseFloat(vesselConfig.bodyRadius) || 1.0;
            const totalVolume = Math.PI * radius * radius * totalHeight;
            const capacityFeet = totalHeight;
            const capacityWeight = totalVolume * density;
            
            // Determine new headroom
            let newHeadroom;
            if (existingData) {
                // If we have existing data, vary headroom from current value
                const headroomVariation = (Math.random() * 4 - 2).toFixed(2);
                const currentHeadroom = parseFloat(existingData.headroom.feet);
                newHeadroom = Math.max(0.1, Math.min(capacityFeet - 0.1, parseFloat((currentHeadroom + parseFloat(headroomVariation)).toFixed(2))));
            } else {
                // First measurement - start with a default headroom
                const defaultHeadroom = 2.59;
                const headroomVariation = (Math.random() * 4 - 2).toFixed(2);
                newHeadroom = Math.max(0.1, Math.min(capacityFeet - 0.1, parseFloat((defaultHeadroom + parseFloat(headroomVariation)).toFixed(2))));
            }
            
            // Product is calculated as Capacity - Headroom
            const productHeight = capacityFeet - newHeadroom;
            const productPercent = (productHeight / capacityFeet) * 100;
            const headroomPercent = (newHeadroom / capacityFeet) * 100;
            
            // Calculate volumes
            const productVolume = Math.PI * radius * radius * productHeight;
            const headroomVolume = Math.PI * radius * radius * newHeadroom;
            
            // Calculate weights
            const productWeight = productVolume * density;
            const headroomWeight = headroomVolume * density;
            
            // Create or update measurement data - Capacity stays the same!
            measurementData[sensorNum] = {
                product: {
                    percent: productPercent.toFixed(1),
                    feet: productHeight.toFixed(2),
                    weight: productWeight.toFixed(2)
                },
                headroom: {
                    percent: headroomPercent.toFixed(1),
                    feet: newHeadroom.toFixed(2),
                    weight: headroomWeight.toFixed(2)
                },
                capacity: {
                    percent: '100.0',
                    feet: capacityFeet.toFixed(2),
                    weight: capacityWeight.toFixed(2)
                }
            };
            
            showingMeasuring = false;
            isMeasuring = false;
            renderScreen();
            if (onComplete) onComplete();
        }, 3000); // 3 seconds
    }
    
    /** Compute and store measurement for one sensor (shared with measure-all sequence). */
    function applyMeasurementForSensor(sensorNum) {
        const bodyHeight = parseFloat(vesselConfig.bodyHeight) || 20.0;
        const hopperHeight = parseFloat(vesselConfig.hopperHeight) || 6.0;
        const totalHeight = bodyHeight + hopperHeight;
        const density = parseFloat(vesselConfig.productDensity) || 20.0;
        const radius = parseFloat(vesselConfig.bodyRadius) || 1.0;
        const totalVolume = Math.PI * radius * radius * totalHeight;
        const capacityFeet = totalHeight;
        const existingData = measurementData[sensorNum];
        let newHeadroom;
        if (existingData) {
            const headroomVariation = (Math.random() * 4 - 2).toFixed(2);
            const currentHeadroom = parseFloat(existingData.headroom.feet);
            newHeadroom = Math.max(0.1, Math.min(capacityFeet - 0.1, parseFloat((currentHeadroom + parseFloat(headroomVariation)).toFixed(2))));
        } else {
            const defaultHeadroom = 2.59;
            const headroomVariation = (Math.random() * 4 - 2).toFixed(2);
            newHeadroom = Math.max(0.1, Math.min(capacityFeet - 0.1, parseFloat((defaultHeadroom + parseFloat(headroomVariation)).toFixed(2))));
        }
        const productHeight = capacityFeet - newHeadroom;
        const productPercent = (productHeight / capacityFeet) * 100;
        const headroomPercent = (newHeadroom / capacityFeet) * 100;
        const productVolume = Math.PI * radius * radius * productHeight;
        const headroomVolume = Math.PI * radius * radius * newHeadroom;
        const productWeight = productVolume * density;
        const headroomWeight = headroomVolume * density;
        const capacityWeight = totalVolume * density;
        measurementData[sensorNum] = {
            product: { percent: productPercent.toFixed(1), feet: productHeight.toFixed(2), weight: productWeight.toFixed(2) },
            headroom: { percent: headroomPercent.toFixed(1), feet: newHeadroom.toFixed(2), weight: headroomWeight.toFixed(2) },
            capacity: { percent: '100.0', feet: capacityFeet.toFixed(2), weight: capacityWeight.toFixed(2) }
        };
    }

    /**
     * All enabled sensors share the same phases: Pending... → Measuring... → Retracted (short) → lb readout.
     */
    function performMeasureAll() {
        clearMeasureAllTimers();
        if (enabledSensors.length === 0) {
            measureAllInProgress = false;
            measureAllPhase = null;
            renderScreen();
            return;
        }

        const MS_PENDING = 600;
        const MS_MEASURING = 1400;
        const MS_RETRACTED = 320;

        measureAllInProgress = true;
        measureAllPhase = 'pending';
        renderScreen();

        scheduleMeasureAllStep(() => {
            measureAllPhase = 'measuring';
            renderScreen();
        }, MS_PENDING);

        scheduleMeasureAllStep(() => {
            measureAllPhase = 'retracted';
            renderScreen();
        }, MS_PENDING + MS_MEASURING);

        scheduleMeasureAllStep(() => {
            enabledSensors.forEach((s) => applyMeasurementForSensor(s));
            measureAllInProgress = false;
            measureAllPhase = null;
            clearMeasureAllTimers();
            renderScreen();
        }, MS_PENDING + MS_MEASURING + MS_RETRACTED);
    }

        // Reset state
        autoAddRemoveScanning = true;

        // Process first sensor immediately (001)
        processSensorScan();
        
        // Start scanning with interval - scan each number from 002 to 120
        autoAddRemoveInterval = setInterval(() => {
            // Increment to next sensor
            autoAddRemoveCurrentSensor++;
            
            // Stop at 120
            if (autoAddRemoveCurrentSensor > 120) {
                stopAutoAddRemoveScanning();
                return;
            }
            
            // Process this sensor
            processSensorScan();
        }, 60); // ~7 seconds total for 120 sensors
    }
    
    // Helper function to process scanning for current sensor
    function processSensorScan() {
        const sensorNum = String(autoAddRemoveCurrentSensor).padStart(3, '0');
        
        // Simulate checking if there's an address for this sensor number
        // For demo purposes, we'll find sensors at certain intervals (e.g., every 5th sensor)
        // In real implementation, this would check actual hardware addresses
        const sensorFound = checkSensorAddress(autoAddRemoveCurrentSensor);
        
        if (sensorFound) {
            // Sensor found - add it to enabled sensors
            if (!enabledSensors.includes(sensorNum)) {
                enabledSensors.push(sensorNum);
                autoAddRemoveFoundCount++;
                autoAddRemoveLastFound = sensorNum;
            }
        }
        
        // Update the display
        renderScreen();
    }
    
    // Function to simulate checking if a sensor address exists
    // In real implementation, this would check actual hardware
    function checkSensorAddress(sensorNumber) {
        // Find sensors 001, 004, and 009 (3 out of 256)
        if (sensorNumber === 1 || sensorNumber === 4 || sensorNumber === 9) return true;
        return false; // All other sensors won't be found
    }
    
    function stopAutoAddRemoveScanning() {
        autoAddRemoveScanning = false;
        if (autoAddRemoveInterval) {
            clearInterval(autoAddRemoveInterval);
            autoAddRemoveInterval = null;
        }

        renderScreen();

                    itemsToShow = menuItems.map((item, index) => ({ item, index }));
                    viewportOffset = 0;
                } else {
                    // Stable 3-row window (no jumping):
                    // - The highlight moves within the 3 visible rows.
                    // - The window scrolls only when the highlight would go off-screen.
                    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
                    const maxOffset = totalItems - ITEMS_PER_SCREEN;

                    // Start from previous window if possible, otherwise center around selection.
                    viewportOffset = previousViewportOffset !== -1 ? previousViewportOffset : clamp(selectedIndex - 1, 0, maxOffset);

                    // Adjust window based on last navigation direction.

                            viewportOffset = selectedIndex - (ITEMS_PER_SCREEN - 1); // bring into view at bottom
                        }
                    } else if (lastListNavDirection === 'down') {
                        if (selectedIndex >= viewportOffset + ITEMS_PER_SCREEN) {
                            viewportOffset = selectedIndex - (ITEMS_PER_SCREEN - 1); // keep selection on bottom
                        } else if (selectedIndex < viewportOffset) {
                            viewportOffset = selectedIndex; // bring into view at top
                        }
                    } else {
                        // No direction yet; just ensure visible.
                        if (selectedIndex < viewportOffset) viewportOffset = selectedIndex;
                        if (selectedIndex >= viewportOffset + ITEMS_PER_SCREEN) viewportOffset = selectedIndex - (ITEMS_PER_SCREEN - 1);
                    }

                    viewportOffset = clamp(viewportOffset, 0, maxOffset);

                    for (let i = 0; i < ITEMS_PER_SCREEN; i++) {
                        const idx = viewportOffset + i;
                        itemsToShow.push({ item: menuItems[idx], index: idx });

                const hasMoreAbove = viewportOffset > 0;

    /** Portrait (narrow): CSS stacks the face — no zoom. Landscape (narrow): zoom fits horizontal bar. */
    const C100_MOBILE_SCALE_MAX_W = 540;
    const C100_DESIGN_W = 480;
    const C100_SCALE_SIDE_PAD = 16;

    function fitC100ConsoleScale() {
        const vp = document.getElementById('c100-console-viewport');
        const scaled = document.getElementById('c100-console-scaled');
        const root = document.getElementById('console-root');
        if (!vp || !scaled || !root) return;
        if (root.classList.contains('hidden')) {
            scaled.style.zoom = '';
            scaled.style.removeProperty('transform');
            scaled.style.removeProperty('transform-origin');
            scaled.style.width = '';
            vp.style.height = '';
            vp.style.width = '';
            return;
        }
        const vw = window.innerWidth;
        if (vw > C100_MOBILE_SCALE_MAX_W) {
            scaled.style.zoom = '';
            scaled.style.removeProperty('transform');
            scaled.style.removeProperty('transform-origin');
            scaled.style.width = '';
            vp.style.height = '';
            vp.style.width = '';
            return;
        }
        const portrait = typeof window.matchMedia === 'function' && window.matchMedia('(orientation: portrait)').matches;
        if (portrait) {
            scaled.style.zoom = '';
            scaled.style.removeProperty('transform');
            scaled.style.removeProperty('transform-origin');
            scaled.style.width = '';
            vp.style.width = '';
            vp.style.height = '';
            return;
        }
        const s = Math.min(1, (vw - C100_SCALE_SIDE_PAD) / C100_DESIGN_W);
        scaled.style.zoom = String(s);
        scaled.style.removeProperty('transform');
        scaled.style.removeProperty('transform-origin');
        scaled.style.width = '';
        vp.style.width = '';
        vp.style.height = '';
    }
