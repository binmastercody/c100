    }

    function positionTutorialPointer(target) {
        if (!tutorialPointer || !tutorialPointerCircle || !target) return;
        const rect = target.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const pointerW = 40;
        const pointerH = 36;
        const gap = 12;
        const margin = 12;
        const overlapBuffer = 8;

        // Match CSS clamp() sizing on phones — never assume a fixed 56px circle
        const circleHalf = (tutorialPointerCircle.offsetWidth && tutorialPointerCircle.offsetHeight)
            ? Math.min(tutorialPointerCircle.offsetWidth, tutorialPointerCircle.offsetHeight) / 2
            : 28;
        tutorialPointerCircle.style.left = `${centerX - circleHalf}px`;
        tutorialPointerCircle.style.top = `${centerY - circleHalf}px`;

        // Elements to avoid: other keypad buttons and the tooltip
        const keypadButtons = Array.from(document.querySelectorAll('button[data-key]'));
        const tooltipEl = document.getElementById('tutorial-tooltip');
        const avoidRects = [
            ...keypadButtons.filter(btn => btn !== target).map(btn => btn.getBoundingClientRect()),
            ...(tooltipEl && !tooltipEl.classList.contains('tutorial-hidden') ? [tooltipEl.getBoundingClientRect()] : [])
        ];

        function overlaps(pos) {
            const pr = { left: pos.left, right: pos.left + pointerW, top: pos.top, bottom: pos.top + pointerH };
            return avoidRects.some(r =>
                !(pr.right < r.left - overlapBuffer || pr.left > r.right + overlapBuffer ||
                  pr.bottom < r.top - overlapBuffer || pr.top > r.bottom + overlapBuffer));
        }

        const keypad = document.querySelector('#console-root .keypad');
        const screenBrand = document.querySelector('#console-root .screen-and-brand');
        const inKeypad = target.closest('.keypad');

        // Build candidate positions. For keypad: always try "right of button" first (like step 1) - works for up, down, right, select; overlap check filters left/back
        let candidates = [];
        if (inKeypad && keypad) {
            const keypadRect = keypad.getBoundingClientRect();
            const screenRect = screenBrand ? screenBrand.getBoundingClientRect() : null;
            const gapLeft = screenRect ? screenRect.right + gap : 0;
            const gapRight = keypadRect.left - gap;
            const spaceNextToButton = 16;
            // For down/up (full-width): nudge top so pointer stays clear of row below/above
            const targetKey = target.getAttribute('data-key');
            const topRightOfButton = targetKey === 'down' ? Math.min(centerY - pointerH / 2, rect.bottom - pointerH - 4) : (targetKey === 'up' ? Math.max(centerY - pointerH / 2, rect.top + 4) : centerY - pointerH / 2);

            // Back and left have a button to their right (✓ and right arrow) – must use LEFT of button. Others use RIGHT (like step 1).
            const useLeftOfButton = targetKey === 'back' || targetKey === 'left';
            candidates = useLeftOfButton ? [
                { left: rect.left - pointerW - spaceNextToButton, top: centerY - pointerH / 2, emoji: '👉' },
                { left: centerX - pointerW / 2, top: keypadRect.top - pointerH - gap, emoji: '👇' },
                { left: centerX - pointerW / 2, top: rect.bottom + gap, emoji: '👆' }
            ] : [
                { left: rect.right + spaceNextToButton, top: topRightOfButton, emoji: '👈' },
                { left: centerX - pointerW / 2, top: keypadRect.top - pointerH - gap, emoji: '👇' },
                { left: centerX - pointerW / 2, top: rect.bottom + gap, emoji: '👆' },
                { left: Math.min(gapRight - pointerW - gap, gapLeft + Math.max(0, gapRight - gapLeft - pointerW) / 2), top: centerY - pointerH / 2, emoji: '👉' }
            ];
        } else {
            // Screen/menu targets
            candidates = [
                { left: rect.right + gap, top: centerY - pointerH / 2, emoji: '👈' },
                { left: rect.left - pointerW - gap, top: centerY - pointerH / 2, emoji: '👉' },
                { left: centerX - pointerW / 2, top: rect.top - pointerH - gap, emoji: '👇' },
                { left: centerX - pointerW / 2, top: rect.bottom + gap, emoji: '👆' }
            ];
        }

        for (const c of candidates) {
            const left = Math.max(margin, Math.min(c.left, window.innerWidth - pointerW - margin));
            const top = Math.max(margin, Math.min(c.top, window.innerHeight - pointerH - margin));
            if (!overlaps({ left, top })) {
                tutorialPointer.textContent = c.emoji;
                tutorialPointer.style.transform = 'none';
                tutorialPointer.style.left = `${left}px`;
                tutorialPointer.style.top = `${top}px`;
                return;
            }
        }
        // Fallback: use first candidate that does NOT overlap (never block buttons)
        for (const c of candidates) {
            const left = Math.max(margin, Math.min(c.left, window.innerWidth - pointerW - margin));
            const top = Math.max(margin, Math.min(c.top, window.innerHeight - pointerH - margin));
            if (!overlaps({ left, top })) {
                tutorialPointer.textContent = c.emoji;
                tutorialPointer.style.transform = 'none';
                tutorialPointer.style.left = `${left}px`;
                tutorialPointer.style.top = `${top}px`;
                return;
            }
        }
        // Last resort: hide pointer rather than block a button
        tutorialPointer.classList.add('tutorial-hidden');
    }

    function updateTutorialUI() {
        const step = getTutorialStep();
        if (!tutorialActive || !step || !tutorialTooltip) {
            if (tutorialTooltip) tutorialTooltip.classList.add('tutorial-hidden');
            if (tutorialPointer) tutorialPointer.classList.add('tutorial-hidden');
            if (tutorialPointerCircle) tutorialPointerCircle.classList.add('tutorial-hidden');
            clearTutorialHighlight();
            return;
        }

        tutorialStepCount.textContent = `Step ${currentTutorialStep + 1} of ${C100_TUTORIAL_STEPS.length}`;
        tutorialTitle.textContent = step.title || '';
        tutorialMessage.textContent = step.message || '';
        tutorialTooltip.classList.remove('tutorial-hidden');

        clearTutorialHighlight();
        const target = getTutorialTargetElement(step);
        const hideCircle = step.hideCircle ||
            (step.state === 'SETUP_AUTO_ADD_REMOVE' && step.action === 'wait') ||
            (step.state === 'MEASURE_VIEW_PROD' && step.action === 'wait') ||
            (step.state === 'MEASURE_VIEW_PRODUCT_DETAIL' && step.action === 'right') ||
            (step.state === 'MEASURE_VIEW_CAPACITY_DETAIL' && step.action === 'right');
        if (target) {
            tutorialHighlightElement = target;
            tutorialHighlightElement.classList.add('tutorial-highlight');
            if (hideCircle) {
                tutorialPointerCircle.classList.add('tutorial-hidden');
            } else {
                tutorialPointerCircle.classList.remove('tutorial-hidden');
            }
            positionTutorialPointer(target);
            tutorialPointer.classList.remove('tutorial-hidden');
        } else {
            tutorialPointer.classList.add('tutorial-hidden');
            tutorialPointerCircle.classList.add('tutorial-hidden');
        }
    }

    let layoutResizeDebounce = null;
    function onLayoutResizeOrRotate() {
        clearTimeout(layoutResizeDebounce);
        layoutResizeDebounce = setTimeout(() => {
            fitC100ConsoleScale();
            if (typeof tutorialActive !== 'undefined' && tutorialActive) {
                updateTutorialUI();
            }
            if (typeof currentState !== 'undefined' && currentState === 'WELCOME') {
                renderScreen();
            }
            const tcOverlay = document.getElementById('c100-tutorial-complete-overlay');
            if (tcOverlay && tcOverlay.classList.contains('c100-tutorial-complete--visible')) {
                resizeC100TutorialCompleteMiniWrap();
            }
        }, 100);
    }
    window.addEventListener('resize', onLayoutResizeOrRotate);
    window.addEventListener('orientationchange', () => {
        setTimeout(onLayoutResizeOrRotate, 200);
    });

    /** Mobile: keep window scroll at 0 so layout doesn’t shift when browser UI toggles. */
    (function initMobileViewportLock() {
        if (typeof window.matchMedia === 'undefined' || !window.matchMedia('(max-width: 540px)').matches) return;
        function scrollTop() {
            window.scrollTo(0, 0);
            if (document.documentElement) document.documentElement.scrollTop = 0;
            if (document.body) document.body.scrollTop = 0;
        }
        scrollTop();
        window.addEventListener('orientationchange', () => setTimeout(scrollTop, 50));
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') scrollTop();
        });
    })();

    (function initC100ConsoleResizeObserver() {
        const root = document.getElementById('console-root');
        if (!root || typeof ResizeObserver === 'undefined') return;
        const ro = new ResizeObserver(() => fitC100ConsoleScale());
        ro.observe(root);
    })();

    function showTutorialStep(stepIndex) {
        if (!tutorialActive) return;
        if (stepIndex >= C100_TUTORIAL_STEPS.length) {
            endC100Tutorial(false);
            return;
        }

        currentTutorialStep = stepIndex;

        if (tutorialAdvanceTimer) {
            clearTimeout(tutorialAdvanceTimer);
            tutorialAdvanceTimer = null;
        }

        updateTutorialUI();

        const step = C100_TUTORIAL_STEPS[stepIndex];
        if (step && step.action === 'auto') {
            const delay = step.advanceDelay || 1500;
            tutorialAdvanceTimer = setTimeout(() => nextTutorialStep(), delay);
        }
    }

    function nextTutorialStep() {
        showTutorialStep(currentTutorialStep + 1);
    }

    function resizeC100TutorialCompleteMiniWrap() {
        const wrap = document.querySelector('#c100-tutorial-complete-overlay .c100-tutorial-complete__mini-scale-wrap');
        const inner = document.querySelector('#c100-tutorial-complete-overlay .c100-tutorial-complete__mini-scale-inner');
        if (!wrap || !inner) return;
        const scaleStr = getComputedStyle(wrap).getPropertyValue('--c100-mini-scale').trim();
        const scale = parseFloat(scaleStr) || 0.36;
        const h = inner.offsetHeight;
        wrap.style.height = Math.max(1, Math.ceil(h * scale)) + 'px';
    }

    function resetC100TutorialCompleteAnimations() {
        const overlay = document.getElementById('c100-tutorial-complete-overlay');
        if (!overlay) return;
        const badge = overlay.querySelector('.c100-tutorial-complete__check-badge');
        const checkSvg = overlay.querySelector('.c100-tutorial-complete__check-svg');
        const title = document.getElementById('c100-tutorial-complete-title');
        const subcopy = document.getElementById('c100-tutorial-complete-subcopy');
        const preview = document.getElementById('c100-tutorial-complete-console-preview');
        const miniWrap = document.getElementById('c100-tutorial-complete-mini-scale-wrap');
        const btn = document.getElementById('c100-tutorial-complete-dismiss');
        const pulseRings = overlay.querySelectorAll('.c100-tutorial-complete__pulse-ring');
        const sparkles = overlay.querySelectorAll('.c100-tutorial-complete__sparkles span');
        [badge, checkSvg, title, subcopy, preview, miniWrap, btn].forEach((el) => {
            if (el) el.style.animation = 'none';
        });
        pulseRings.forEach((el) => {
            el.style.animation = 'none';
        });
        sparkles.forEach((el) => {
            el.style.animation = 'none';
        });
        void overlay.offsetWidth;
        if (badge) badge.style.animation = 'c100-tc-badge-pop 0.62s cubic-bezier(0.34, 1.55, 0.64, 1) forwards';
        if (checkSvg) checkSvg.style.animation = 'c100-tc-check-in 0.48s cubic-bezier(0.34, 1.2, 0.64, 1) 0.12s forwards';
        pulseRings.forEach((el, i) => {
            el.style.animation = `c100-tc-pulse-ring 1.05s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${i * 0.11}s forwards`;
        });
        if (title) title.style.animation = 'c100-tc-headline-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.42s forwards';
        if (subcopy) subcopy.style.animation = 'c100-tc-headline-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.58s forwards';
        if (preview) preview.style.animation = 'c100-tc-preview-fade 0.36s ease-out 0.18s forwards';
        if (miniWrap) {
            miniWrap.style.animation = 'c100-tc-device-bindisc 1.12s cubic-bezier(0.34, 1.15, 0.64, 1) 0.22s forwards';
        }
        sparkles.forEach((el, i) => {
            el.style.animation = `c100-tc-sparkle 0.78s cubic-bezier(0.34, 1.1, 0.64, 1) ${0.34 + i * 0.055}s forwards`;
        });
        if (btn) {
            btn.style.animation =
                'c100-tc-slide-up 0.58s cubic-bezier(0.22, 1, 0.36, 1) 1.02s forwards, c100-tc-btn-glow 2.2s ease-in-out 1.52s 2 alternate';
        }
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                resizeC100TutorialCompleteMiniWrap();
            });
        });
    }

    function showC100TutorialCompleteOverlay(skipped) {
        const overlay = document.getElementById('c100-tutorial-complete-overlay');
        const titleEl = document.getElementById('c100-tutorial-complete-title');
        const line1 = document.getElementById('c100-tutorial-complete-line1');
        const line2 = document.getElementById('c100-tutorial-complete-line2');
        const previewWrap = document.getElementById('c100-tutorial-complete-console-preview');
        if (!overlay || !titleEl || !line1 || !line2) return;
        if (skipped) {
            titleEl.textContent = 'Guide closed.';
            line1.textContent = 'The tutorial is off. You can keep using the C-100 emulator below.';
            line2.textContent = '';
            line2.style.display = 'none';
            if (previewWrap) previewWrap.classList.add('hidden');
        } else {
            titleEl.textContent = 'Setup Complete';
            line1.textContent = "You've finished the guided walkthrough.";
            line2.textContent = '';
            line2.style.display = 'none';
            if (previewWrap) previewWrap.classList.remove('hidden');
        }
        overlay.style.display = 'flex';
        overlay.setAttribute('aria-hidden', 'false');
        /* Defer animations: display:none→flex in the same frame skips CSS animations in many browsers. */
        requestAnimationFrame(() => {
            overlay.classList.add('c100-tutorial-complete--visible');
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    resetC100TutorialCompleteAnimations();
                });
            });
        });
    }

    function hideC100TutorialCompleteOverlay() {
        const overlay = document.getElementById('c100-tutorial-complete-overlay');
        if (!overlay) return;
        overlay.classList.remove('c100-tutorial-complete--visible');
        overlay.setAttribute('aria-hidden', 'true');
        setTimeout(() => {
            if (!overlay.classList.contains('c100-tutorial-complete--visible')) {
                overlay.style.display = 'none';
            }
        }, 600);
    }

    function endC100Tutorial(skipped) {
        tutorialActive = false;
        if (tutorialAdvanceTimer) {
            clearTimeout(tutorialAdvanceTimer);
            tutorialAdvanceTimer = null;
        }
        updateTutorialUI();
        showC100TutorialCompleteOverlay(!!skipped);
    }

    function startC100Tutorial() {
        tutorialActive = true;
        currentTutorialStep = 0;
        showTutorialStep(0);
    }

    function maybeAutoAdvanceTutorial() {
        const step = getTutorialStep();
        if (!tutorialActive || !step || !step.advanceWhen) return;
        if (step.advanceWhen()) {
            nextTutorialStep();
        }
    }

    function queueTutorialAdvance(direction, actionContext) {
        if (!tutorialActive || !actionContext) return;
        const step = actionContext.step;
        if (!step) return;
        if (step.state && step.state !== actionContext.prevState) return;

        if (step.action === 'any') {
            tutorialPendingAdvance = { direction, actionContext };
            return;
        }

        if (step.action === direction) {
            tutorialPendingAdvance = { direction, actionContext };
        }
    }

    function tutorialAllowsAction(direction) {
        if (!tutorialActive) return true;
        const step = getTutorialStep();
        if (!step) return true;

        if (step.state && step.state !== currentState) {
            return false;
        }

        if (step.action === 'any') {
            return true;
        }

        if (step.action === 'auto' || step.action === 'wait') {
            // Block all keys including back during wait (scan, measure-all, etc.) so the guide can't be skipped
            return false;
        }

        // For select steps with targetIndex/targetLabel: allow up/down to navigate to target first
        if (step.action === 'select' && (step.targetIndex !== undefined || step.targetLabel)) {
            const targetIdx = step.targetLabel ? getMenuIndexByLabel(step.state, step.targetLabel) : step.targetIndex;
            if (targetIdx !== null && targetIdx !== undefined && selectedIndex !== targetIdx) {
                if (direction === 'up' || direction === 'down') return true;
                return false; // Block select until we're on target
            }
        }

        if (direction === 'select') {
            if (step.action !== 'select') return false;
            if (step.targetLabel) {
                const idx = getMenuIndexByLabel(step.state, step.targetLabel);
                return idx !== null && selectedIndex === idx;
            }
            if (step.targetIndex !== undefined && step.targetIndex !== null) {
                return selectedIndex === step.targetIndex;
            }
            return true;
        }

        if (direction === 'back') {
            return step.action === 'back';
        }

        // Input steps (selector): allow left/right/up/down for editing digits; back remains blocked above
        const menu = menuData[currentState];
        if (step.selector && menu?.type === 'input') {
            if (direction === 'left' || direction === 'right' || direction === 'up' || direction === 'down') {
                return true;
            }
        }

        if (direction === 'right') {
            return step.action === 'right';
        }

        if (direction === 'left') {
            return step.action === 'left';
        }

        if (direction === 'up') {
            // When on target for a 'down' step, block up to prevent navigating away
            if (step.action === 'down' && step.targetIndex !== undefined && selectedIndex === step.targetIndex) {
                return false;
            }
            return step.action === 'up';
        }

        if (direction === 'down') {
            // When on target for an 'up' step, block down to prevent navigating away
            if (step.action === 'up' && step.targetIndex !== undefined && selectedIndex === step.targetIndex) {
                return false;
            }
            return step.action === 'down';
        }

        return true;
    }

    function maybeAdvanceAfterAction(direction, actionContext) {
        const step = actionContext ? actionContext.step : null;
        if (!tutorialActive || !step) return;

        const { prevState, prevIndex } = actionContext;
        const matchesState = step.state === prevState;

        if (direction === 'select' && step.action === 'select' && matchesState) {
            if (step.targetLabel) {
                const idx = getMenuIndexByLabel(step.state, step.targetLabel);
                if (idx !== null && prevIndex === idx) {
                    if (step.advanceDelay) {
                        tutorialAdvanceTimer = setTimeout(() => nextTutorialStep(), step.advanceDelay);
                    } else {
                        nextTutorialStep();
                    }
                }
            } else if (step.targetIndex !== undefined && step.targetIndex !== null) {
                if (prevIndex === step.targetIndex) {
                    if (step.advanceDelay) {
                        tutorialAdvanceTimer = setTimeout(() => nextTutorialStep(), step.advanceDelay);
                    } else {
                        nextTutorialStep();
                    }
                }
            } else {
                if (step.advanceDelay) {
                    tutorialAdvanceTimer = setTimeout(() => nextTutorialStep(), step.advanceDelay);
                } else {
                    nextTutorialStep();
                }
            }
        } else if (direction === 'back' && step.action === 'back' && matchesState) {
            nextTutorialStep();
        } else if (direction === 'right' && step.action === 'right' && matchesState) {
            nextTutorialStep();
        } else if (direction === 'left' && step.action === 'left' && matchesState) {
            nextTutorialStep();
        } else if (direction === 'down' && step.action === 'down' && matchesState) {
            if (step.targetIndex !== undefined && step.targetIndex !== null) {
                if (selectedIndex === step.targetIndex) {
                    nextTutorialStep();
                }
            } else if (step.targetLabel) {
                const idx = getMenuIndexByLabel(step.state, step.targetLabel);
                if (idx !== null && selectedIndex === idx) {
                    nextTutorialStep();
                }
            } else {
                nextTutorialStep();
            }
        } else if (direction === 'up' && step.action === 'up' && matchesState) {
            if (step.targetIndex !== undefined && step.targetIndex !== null) {
                if (selectedIndex === step.targetIndex) {
                    nextTutorialStep();
                }
            } else if (step.targetLabel) {
                const idx = getMenuIndexByLabel(step.state, step.targetLabel);
                if (idx !== null && selectedIndex === idx) {
                    nextTutorialStep();
                }
            } else {
                nextTutorialStep();
            }
        } else if (step.action === 'any') {
            nextTutorialStep();
        }
    }

    if (tutorialSkipButton) {
        tutorialSkipButton.addEventListener('click', () => endC100Tutorial(true));
    }

    const c100TutorialCompleteDismiss = document.getElementById('c100-tutorial-complete-dismiss');
    if (c100TutorialCompleteDismiss) {
        c100TutorialCompleteDismiss.addEventListener('click', () => hideC100TutorialCompleteOverlay());
    }

    // --- NAVIGATION HANDLERS ---
    function navigate(direction) {
        ensureTutorialSensorsOnMeasureView();

        const menu = menuData[currentState];
        const actionContext = tutorialActive ? { step: getTutorialStep(), prevState: currentState, prevIndex: selectedIndex } : null;

        if (!tutorialAllowsAction(direction)) {
            return;
        }

        if (tutorialActive && actionContext) {
            queueTutorialAdvance(direction, actionContext);
        }

        // Handle welcome screen - any key press goes to main menu
        if (menu.type === 'welcome') {
            currentState = 'MAIN_MENU';
            selectedIndex = 0;
            renderScreen();
            return;
        }

        // Handle back from Auto Add/Remove screens (type: info - not in nav/select block)
        if (direction === 'back' && (currentState === 'SETUP_AUTO_ADD_REMOVE' || currentState === 'SETUP_AUTO_ADD_REMOVE_WARNING')) {
            if (currentState === 'SETUP_AUTO_ADD_REMOVE') {
                stopAutoAddRemoveScanning();
            }
            currentState = 'SETUP';
            const setupItems = typeof menuData['SETUP'].items === 'function' ? menuData['SETUP'].items() : menuData['SETUP'].items;
            selectedIndex = setupItems.indexOf('Auto Add/Remove');
            renderScreen();
            updateTutorialUI();
            return;
        }

        if (menu.type === 'nav' || menu.type === 'select') {
            // Handle dynamic menu items (functions that return arrays)
            const items = typeof menu.items === 'function' ? menu.items() : menu.items;

            // Disable navigation for "No sensors enabled" warning message
            if (menu.type === 'nav' && items.length > 0 && items[0] === 'No sensors enabled') {
                // Only allow back navigation
                if (direction === 'back') {
                    stateIndexMap[currentState] = selectedIndex;
                    currentState = history.pop() || 'MAIN_MENU';
                    selectedIndex = stateIndexMap[currentState] || 0;
                    renderScreen();
                }
                return; // Ignore all other navigation
            }
            
            // Disable navigation for "No sensors enabled" in select menus (like Interval Timer Assign)
            if (menu.type === 'select' && items.length > 0 && items[0] === 'No sensors enabled') {
                // Only allow back navigation
                if (direction === 'back') {
                    stateIndexMap[currentState] = selectedIndex;
                    currentState = history.pop() || 'MAIN_MENU';
                    selectedIndex = stateIndexMap[currentState] || 0;
                    renderScreen();
                }
                return; // Ignore all other navigation
            }

            if (direction === 'up') {
                previousSelectedIndex = selectedIndex;
                lastListNavDirection = 'up';
                selectedIndex = Math.max(0, selectedIndex - 1);
            } else if (direction === 'down') {
                previousSelectedIndex = selectedIndex;
                lastListNavDirection = 'down';
                selectedIndex = Math.min(items.length - 1, selectedIndex + 1);
            } else if (direction === 'select') {
                if (menu.type === 'select') {
                    // Toggling checkmark or confirming selection
                    if (menu.allowsToggle) {
                        // For SETUP_ADD_REMOVE, checked is a function that reads from enabledSensors
                        // So we update enabledSensors directly
                        if (currentState === 'SETUP_ADD_REMOVE') {
                            const sensorId = items[selectedIndex];
                            const wasChecked = enabledSensors.includes(sensorId);
                            if (wasChecked) {
                                // Remove sensor
                                enabledSensors = enabledSensors.filter(s => s !== sensorId);
                            } else {
                                // Add sensor
                                if (!enabledSensors.includes(sensorId)) {
                                    enabledSensors.push(sensorId);
                                }
                            }
                        } else if (currentState === 'SETUP_INTERVAL_TIMER_ASSIGN') {
                            // Handle "No sensors enabled" - no action
                            if (enabledSensors.length === 0) {
                                return; // Do nothing
                            }
                            
                            const selectedItem = items[selectedIndex];
                            
                            if (selectedIndex === 0) {
                                // "Assign All" or "Unassign All" was selected
                                const allAssigned = enabledSensors.every(sensor => intervalTimerAssignedSensors.includes(sensor));
                                if (allAssigned) {
                                    // Unassign all
                                    intervalTimerAssignedSensors = [];
                                } else {
                                    // Assign all enabled sensors
                                    intervalTimerAssignedSensors = [...enabledSensors];
                                }
                            } else {
                                // Individual sensor toggle
                                const sensorId = selectedItem;
                                const wasChecked = intervalTimerAssignedSensors.includes(sensorId);
                                if (wasChecked) {
                                    // Unassign sensor
                                    intervalTimerAssignedSensors = intervalTimerAssignedSensors.filter(s => s !== sensorId);
                                } else {
                                    // Assign sensor
                                    if (!intervalTimerAssignedSensors.includes(sensorId)) {
                                        intervalTimerAssignedSensors.push(sensorId);
                                    }
                                }
                            }
                        } else {
                            // For other toggle menus, handle checked as array
                            if (typeof menu.checked === 'function') {
                                // If checked is a function, we can't modify it directly
                                // This shouldn't happen for other menus, but handle it gracefully
                            } else {
                                // Handle multiple selections - checked is an array of indices
                                if (!Array.isArray(menu.checked)) {
                                    menu.checked = menu.checked === -1 ? [] : [menu.checked];
                                }
                                const wasChecked = menu.checked.includes(selectedIndex);
                                if (wasChecked) {
                                    // Remove from checked array
                                    menu.checked = menu.checked.filter(i => i !== selectedIndex);
                                } else {
                                    // Add to checked array
                                    menu.checked.push(selectedIndex);
                                }
                            }
                        } 
                    } else {
                        // For SETUP_ACCESS_CODE, don't set menu.checked since it's a function
                        if (currentState !== 'SETUP_ACCESS_CODE') {
                            menu.checked = selectedIndex;
                        }
                        let selectedValue = items[selectedIndex];
                        
                        // Handle access code disable (On/Set navigates to input screen)
                        if (currentState === 'SETUP_ACCESS_CODE') {
                            if (selectedValue === 'Off') {
                                accessCodeEnabled = false;
                                accessCodeValue = '0000'; // Reset code when disabled
                            }
                            // On/Set will navigate to SETUP_ACCESS_CODE_INPUT to set the code
                        }
                        
                        // Save vessel configuration values
                        if (currentState === 'CONFIG_VESSEL_SHAPE') {
                            vesselConfig.shape = selectedValue;
                        } else if (currentState === 'CONFIG_HOPPER_PRESENT') {
                            vesselConfig.hopperPresent = selectedValue;
                        } else if (currentState === 'CONFIG_SMARTBOB_MAX_DROP') {
                            vesselConfig.smartBobMaxDropEnabled = selectedValue;
                        }
                        
                        // Save measurement type
                        if (currentState === 'SETUP_MEASUREMENT_TYPE') {
                            measurementType = selectedValue;
                        }
                        
                        // Handle other select menus
                        {
                            // Determine next state based on selection value (e.g., Weight Calc Enabled/Disabled)
                            nextState = null;
                            const nextStateMapEntry = nextStateMap[currentState];
                            if (nextStateMapEntry) {
                                if (typeof nextStateMapEntry === 'function') {
                                    nextState = nextStateMapEntry();
                                } else if (nextStateMapEntry[selectedValue]) {
                                    nextState = nextStateMapEntry[selectedValue];
                                }
                            }
                            if (!nextState && menu.next) {
                                nextState = menu.next;
                            }
                        }
                        
                        if (nextState) {
                            // Stop Auto Add/Remove scanning if leaving that menu
                            if (currentState === 'SETUP_AUTO_ADD_REMOVE') {
                                stopAutoAddRemoveScanning();
                            }
                            
                            // Stop Auto Add/Remove scanning if leaving that menu
                            if (currentState === 'SETUP_AUTO_ADD_REMOVE') {
                                stopAutoAddRemoveScanning();
                            }
                            
                            // Save current state's selectedIndex before navigating away
                            stateIndexMap[currentState] = selectedIndex;
                            // If completing vessel config and returning to SETUP_VESSEL_SETUP, set history to just SETUP
                            if (nextState === 'SETUP_VESSEL_SETUP' && vesselConfigStates.includes(currentState)) {
                                history = ['SETUP']; // Set history to SETUP so back button goes directly to Setup menu
                            } else if (vesselConfigStates.includes(nextState) && !vesselConfigStates.includes(currentState)) {
                                history = [currentState]; // Keep only the entry point
                            } else {
                                history.push(currentState);
                            }
                            currentState = nextState;
                            
                            // Start Auto Add/Remove scanning when entering that menu
                            if (nextState === 'SETUP_AUTO_ADD_REMOVE') {
                                // Set initial value immediately before any render
                                autoAddRemoveCurrentSensor = 1;
                                autoAddRemoveFoundCount = 0;
                                autoAddRemoveLastFound = null;
                            }
                            
                            // Restore selectedIndex for the new state, or default to checked value or 0
                            // For input screens, always use 0 (they don't use selectedIndex)
                            const nextMenu = menuData[nextState];
                            if (nextMenu && nextMenu.type === 'input') {
                                selectedIndex = 0;
                            } else {
                                // For specific menus, set default selectedIndex
                                if (nextState === 'CONFIG_SMARTBOB_MAX_DROP') {
                                    selectedIndex = 1; // Disabled
                                } else if (nextState === 'SETUP_SENSOR_TYPE') {
                                    selectedIndex = 0; // NCR-80/GWR-2000 (default checked)
                                } else if (nextState === 'SETUP_SB485_PROTOCOL') {
                                    selectedIndex = 0; // Protocol A
                                } else if (nextState === 'SETUP_SB485_TERMINATION') {
                                    selectedIndex = 0; // IN
                                } else if (nextState === 'SETUP_ACCESS_CODE') {
                                    // Initialize based on accessCodeEnabled (Off = 1, On/Set = 0)
                                    selectedIndex = accessCodeEnabled ? 0 : 1;
                                } else if (nextState === 'SETUP_MEASUREMENT_TYPE') {
                                    // Initialize based on current measurementType (Headroom = 0, Product = 1)
                                    selectedIndex = measurementType === 'Product' ? 1 : 0;
                                } else {
                                    selectedIndex = stateIndexMap[nextState] || 0;
                                }
                            }
                            
                            // Start Auto Add/Remove scanning after state is fully set up
                            if (nextState === 'SETUP_AUTO_ADD_REMOVE') {
                                startAutoAddRemoveScanning();
                                // Skip the final renderScreen() call since processSensorScan() will handle it
                                return;
                            }
                        } else {
                             // Save current state's selectedIndex before going back
                             stateIndexMap[currentState] = selectedIndex;
                             currentState = history.pop() || 'MAIN_MENU';
                             // Restore selectedIndex for the previous state, or default to 0
                             selectedIndex = stateIndexMap[currentState] || 0;
                        }
                    }
                } else if (menu.type === 'nav') {
                    // Navigate to next screen
                    const selectedItem = items[selectedIndex];
                    let nextState = null;
                    
                    // Handle dynamic sensor selection in Measure/View
                    if (currentState === 'MEASURE_VIEW_PROD') {
                        if (selectedItem === 'Measure All') {
                            performMeasureAll();
                            renderScreen();
                            updateTutorialUI();
                            return; // Stay on MEASURE_VIEW_PROD, don't navigate
                        } else {
                            const sensorMatch = selectedItem.match(/^(\d{3}):/);
                            if (sensorMatch) {
                                currentDetailSensor = sensorMatch[1];
                                nextState = 'MEASURE_VIEW_PRODUCT_DETAIL';
                            }
                        }
                    }
                    // Handle dynamic sensor selection in Vessel Setup
                    else if (currentState === 'SETUP_VESSEL_SETUP' && /^\d{3}$/.test(selectedItem)) {
                        // Selected item is a sensor ID (3 digits), route to vessel config
                        nextState = 'CONFIG_VESSEL_SHAPE';
                    } else {
                        // Handle function-based nextStateMap entries
                        const nextStateMapEntry = nextStateMap[currentState];
                        if (nextStateMapEntry) {
                            const selectedValue = nextStateMapEntry[selectedItem];
                            if (typeof selectedValue === 'function') {
                                nextState = selectedValue();
                            } else if (selectedValue) {
                                nextState = selectedValue;
                            } else {
                                nextState = nextStateMapEntry['default'] || null;
                            }
                        }
                    }
                    
                    // Intercept Setup navigation to check access code (only when coming from MAIN_MENU)
                    if (nextState === 'SETUP' && currentState === 'MAIN_MENU' && accessCodeEnabled) {
                        // Access code is enabled - show entry screen instead
                        nextState = 'ACCESS_CODE_ENTRY';
                        menuData['ACCESS_CODE_ENTRY'].value = '####'; // Reset entry screen
                        inputCursorPos = 0;
                    }

                    if (nextState) {
                        // Save current state's selectedIndex before navigating away
                        stateIndexMap[currentState] = selectedIndex;
                        // If entering vessel config, clear history to prevent back button from going through all steps
                        if (vesselConfigStates.includes(nextState) && !vesselConfigStates.includes(currentState)) {
                            history = [currentState]; // Keep only the entry point
                        } else {
                            history.push(currentState);
                        }
                        currentState = nextState;
                        // Restore selectedIndex for the new state, or default to 0
                        if (nextState === 'SETUP_ACCESS_CODE') {
                            // Initialize based on accessCodeEnabled (Off = 1, On/Set = 0)
                            selectedIndex = accessCodeEnabled ? 0 : 1;
                        } else if (nextState === 'SETUP_MEASUREMENT_TYPE') {
                            // Initialize based on current measurementType (Headroom = 0, Product = 1)
                            selectedIndex = measurementType === 'Product' ? 1 : 0;
                        } else {
                            selectedIndex = stateIndexMap[nextState] || 0;
                        }
                        inputCursorPos = 0;
                        
                        // Start Auto Add/Remove scanning when entering that menu
                        if (nextState === 'SETUP_AUTO_ADD_REMOVE') {
                            // Set initial value immediately before any render
                            autoAddRemoveCurrentSensor = 1;
                            autoAddRemoveFoundCount = 0;
                            autoAddRemoveLastFound = null;
                            // Render screen first to show the state
                            renderScreen();
                            // Then start scanning (which will update the screen)
                            startAutoAddRemoveScanning();
                            return;
                        }
                    }
                }
            }
        } else if (menu.type === 'input') {
            let valArray = menu.value.split('');
            // Include '#' in cursor navigation (all editable characters except . and :)
            const allEditableIndices = valArray.map((c, i) => (c === '.' || c === ':') ? -1 : i).filter(i => i !== -1);
            let currentDigitIndexInValue = allEditableIndices[inputCursorPos];
            
            if (direction === 'left') {
                inputCursorPos = Math.max(0, inputCursorPos - 1);
            } else if (direction === 'right') {
                inputCursorPos = Math.min(allEditableIndices.length - 1, inputCursorPos + 1);
            } else if (direction === 'up' || direction === 'down') {
                let currentChar = valArray[currentDigitIndexInValue];
                // Handle sign toggle for +/-
                if (currentChar === '+' || currentChar === '-') {
                    valArray[currentDigitIndexInValue] = currentChar === '+' ? '-' : '+';
                    menu.value = valArray.join('');
                } else if (currentChar === '#') {
                    // Handle # character - up arrow changes to 0, down does nothing
                    if (direction === 'up') {
                        valArray[currentDigitIndexInValue] = '0';
                        menu.value = valArray.join('');
                    }
                } else {
                    let currentDigit = parseInt(currentChar);
                    if (!isNaN(currentDigit)) {
                        if (direction === 'up') {
                            currentDigit = (currentDigit + 1) % 10;
                        } else {
                            currentDigit = (currentDigit + 9) % 10;
                        }
                        valArray[currentDigitIndexInValue] = currentDigit.toString();
                        menu.value = valArray.join('');
                    }
                }
            } else if (direction === 'back') {
                // Handle back button for ACCESS_CODE_ENTRY - allow cancel back to MAIN_MENU
                if (currentState === 'ACCESS_CODE_ENTRY') {
                    // User can cancel entering the code; return to MAIN_MENU
                    menu.value = '####'; // Reset
                    inputCursorPos = 0;
                    currentState = 'MAIN_MENU';
                    selectedIndex = stateIndexMap['MAIN_MENU'] || 0;
                    renderScreen();
                    return;
                }
                // Handle back button for SETUP_ACCESS_CODE_INPUT - go back to SETUP_ACCESS_CODE without saving
                if (currentState === 'SETUP_ACCESS_CODE_INPUT') {
                    // Reset input value - don't save anything
                    menu.value = '####';
                    inputCursorPos = 0;
                    // Don't enable access code or save anything - just go back
                    stateIndexMap[currentState] = selectedIndex;
                    currentState = history.pop() || 'SETUP';
                    // Initialize based on accessCodeEnabled (Off = 1, On/Set = 0)
                    if (currentState === 'SETUP_ACCESS_CODE') {
                        selectedIndex = accessCodeEnabled ? 0 : 1;
                    } else {
                        selectedIndex = stateIndexMap[currentState] || 0;
                    }
                    renderScreen();
                    return;
                }
                // Handle back button for input type when in vessel config
                if (vesselConfigStates.includes(currentState)) {
                    // Save current input value before leaving
                    if (currentState === 'CONFIG_BODY_HEIGHT') {
                        vesselConfig.bodyHeight = menu.value;
                    } else if (currentState === 'CONFIG_BODY_RADIUS') {
                        vesselConfig.bodyRadius = menu.value;
                    } else if (currentState === 'CONFIG_HOPPER_HEIGHT') {
                        vesselConfig.hopperHeight = menu.value;
                    } else if (currentState === 'CONFIG_OUTLET_RADIUS') {
                        vesselConfig.outletRadius = menu.value;
                    } else if (currentState === 'CONFIG_SENSOR_OFFSET') {
                        vesselConfig.sensorOffset = menu.value;
                    } else if (currentState === 'CONFIG_PRODUCT_DENSITY') {
                        vesselConfig.productDensity = menu.value;
                    } else if (currentState === 'CONFIG_SMARTBOB_MAX_DROP_INPUT') {
                        vesselConfig.smartBobMaxDrop = menu.value;
                    }
                    // Return to vessel setup selection
                    currentState = 'SETUP_VESSEL_SETUP';
                    selectedIndex = 0;
                    inputCursorPos = 0;
                    // Set history to just SETUP so back button goes directly to SETUP menu
                    history = ['SETUP'];
                }
            } else if (direction === 'select') {
                 // Handle ACCESS_CODE_ENTRY - verify code
                 if (currentState === 'ACCESS_CODE_ENTRY') {
                     // Check if all digits have been set (no # characters remaining)
                     if (menu.value.includes('#')) {
                         // Still has # characters - don't proceed, just return
                         return;
                     }
                     // Replace any remaining # with 0 for comparison (shouldn't be any at this point)
                     const enteredCode = menu.value.replace(/#/g, '0');
                     if (enteredCode === accessCodeValue) {
                         // Code correct - proceed to Setup
                         // Set history to MAIN_MENU so back button goes to Main Menu, not ACCESS_CODE_ENTRY
                         history = ['MAIN_MENU'];
                         currentState = 'SETUP';
                         selectedIndex = 0;
                         inputCursorPos = 0;
                         menu.value = '####'; // Reset for next time
                         renderScreen();
                         return;
                     } else {
                         // Code incorrect - reset and stay on entry screen
                         menu.value = '####';
                         inputCursorPos = 0;
                         renderScreen();
                         return;
                     }
                 }
                 
                 // Save access code when setting it and enable protection
                 if (currentState === 'SETUP_ACCESS_CODE_INPUT') {
                     // Check if all digits have been set (no # characters remaining)
                     if (menu.value.includes('#')) {
                         // Still has # characters - don't save, just return
                         return;
                     }
                     // Replace any # with 0 before saving (shouldn't be any at this point, but just in case)
                     accessCodeValue = menu.value.replace(/#/g, '0');
                     // Enable access code protection
                     accessCodeEnabled = true;
                 }
                 
                 // Save vessel configuration input values
                 if (currentState === 'CONFIG_BODY_HEIGHT') {
                     vesselConfig.bodyHeight = menu.value;
                 } else if (currentState === 'CONFIG_BODY_RADIUS') {
                     vesselConfig.bodyRadius = menu.value;
                 } else if (currentState === 'CONFIG_HOPPER_HEIGHT') {
                     vesselConfig.hopperHeight = menu.value;
                 } else if (currentState === 'CONFIG_OUTLET_RADIUS') {
                     vesselConfig.outletRadius = menu.value;
                 } else if (currentState === 'CONFIG_SENSOR_OFFSET') {
                     vesselConfig.sensorOffset = menu.value;
                 } else if (currentState === 'CONFIG_PRODUCT_DENSITY') {
                     vesselConfig.productDensity = menu.value;
                 } else if (currentState === 'CONFIG_SMARTBOB_MAX_DROP_INPUT') {
                     vesselConfig.smartBobMaxDrop = menu.value;
                 }
                 
                 // Finalize input and move to the next step
                 const nextState = menu.next;
                 if (nextState) {
                    // If completing access code setup, don't add SETUP_ACCESS_CODE_INPUT to history
                    // This prevents going back to the input screen after the code is saved
                    if (currentState === 'SETUP_ACCESS_CODE_INPUT' && nextState === 'SETUP') {
                        // After saving a code, Settings should exit with ONE back press like normal.
                        // Reset history to MAIN_MENU so back from SETUP returns to MAIN_MENU (not to Access Code screens).
                        history = ['MAIN_MENU'];
                        // Don't push SETUP_ACCESS_CODE_INPUT to history
                    } else if (nextState === 'SETUP_VESSEL_SETUP') {
                        // If completing vessel config and returning to SETUP_VESSEL_SETUP, set history to just SETUP
                        history = ['SETUP'];
                    } else if (vesselConfigStates.includes(nextState)) {
                        // Continue in vessel config flow
                        history.push(currentState);
                    } else {
                        history.push(currentState);
                    }
                    currentState = nextState;
                    // For CONFIG_SMARTBOB_MAX_DROP, always default to Disabled (index 1)
                    if (nextState === 'CONFIG_SMARTBOB_MAX_DROP') {
                        selectedIndex = 1; // Disabled
                    } else {
                        selectedIndex = 0;
                    }
                    inputCursorPos = 0;
                 }
            }

        } else if (menu.type === 'info' || menu.type === 'detail') {
             // Handle left/right navigation for detail pages
             if (menu.type === 'detail' && (direction === 'left' || direction === 'right')) {
                // Product → Capacity → Headroom (then ▶ wraps to Product)
                const detailPages = ['MEASURE_VIEW_PRODUCT_DETAIL', 'MEASURE_VIEW_CAPACITY_DETAIL', 'MEASURE_VIEW_HEADROOM_DETAIL'];
                const currentIndex = detailPages.indexOf(currentState);
                if (currentIndex !== -1) {
                    let nextIndex;
                    if (direction === 'right') {
                        nextIndex = (currentIndex + 1) % detailPages.length;
                    } else {
                        nextIndex = (currentIndex - 1 + detailPages.length) % detailPages.length;
                    }
                    currentState = detailPages[nextIndex];
                    renderScreen();
                    return;
                }
             }
             if (direction === 'back') {
                // Pressing back returns to the previous menu
                if (currentState === 'SETUP_AUTO_ADD_REMOVE') {
                     // Stop scanning
                     stopAutoAddRemoveScanning();
                     // Auto Add/Remove found sensor 001 - enable it (already added during scanning)
                     currentState = 'SETUP';
                     selectedIndex = menuData['SETUP'].items.indexOf('Auto Add/Remove');
                } else if (currentState === 'SETUP_AUTO_ADD_REMOVE_WARNING') {
                    // Go back to Setup
                    currentState = 'SETUP';
                    selectedIndex = menuData['SETUP'].items.indexOf('Auto Add/Remove');
                } else {
                    // Save current state's selectedIndex before going back
                    stateIndexMap[currentState] = selectedIndex;
                    currentState = history.pop() || 'MAIN_MENU';
                    // For specific menus, set default selectedIndex
                    if (currentState === 'CONFIG_SMARTBOB_MAX_DROP') {
                        selectedIndex = 1; // Disabled
                    } else if (currentState === 'SETUP_SENSOR_TYPE') {
                        selectedIndex = 0; // NCR-80/GWR-2000 (default checked)
                    } else if (currentState === 'SETUP_SB485_PROTOCOL') {
                        selectedIndex = 0; // Protocol A
                    } else if (currentState === 'SETUP_SB485_TERMINATION') {
                        selectedIndex = 0; // IN
                    } else {
                        selectedIndex = stateIndexMap[currentState] || 0;
                    }
                }
             } else if (direction === 'select') {
                // Handle Auto Add/Remove warning - checkmark confirms and proceeds
                if (currentState === 'SETUP_AUTO_ADD_REMOVE_WARNING') {
                    // Clear enabled sensors and vessel settings
                    enabledSensors = [];
                    // Reset vessel config to defaults
                    vesselConfig = {
                        shape: 'Circular',
                        bodyHeight: '020.00',
                        bodyRadius: '15.00',
                        hopperPresent: 'Yes',
                        hopperHeight: '06.00',
                        outletRadius: '01.00',
                        sensorOffset: '+00.00',
                        productDensity: '020.00',
                        smartBobMaxDropEnabled: 'Disabled',
                        smartBobMaxDrop: '02.50'
                    };
                    // Set history to SETUP so back button goes to Setup (not warning)
                    history = ['SETUP'];
                    currentState = 'SETUP_AUTO_ADD_REMOVE';
                    // Set initial value and start scanning
                    autoAddRemoveCurrentSensor = 1;
                    autoAddRemoveFoundCount = 0;
                    autoAddRemoveLastFound = null;
                    startAutoAddRemoveScanning();
                    return; // Skip renderScreen() since processSensorScan() will handle it
                }
                // For Auto Add/Remove scanning, select button does nothing
                else if (currentState === 'SETUP_AUTO_ADD_REMOVE') {
                    // Do nothing - only back button works
                    return;
                } 
                // Handle measurement trigger on detail screens
                else if (menu.type === 'detail') {
                    // Trigger measurement for the current sensor
                    performMeasurement(currentDetailSensor);
                    return; // Don't navigate away, just update the screen
                } else {
                    // For other info/detail screens, select returns to previous menu
                    stateIndexMap[currentState] = selectedIndex;
                    currentState = history.pop() || 'MAIN_MENU';
                    selectedIndex = stateIndexMap[currentState] || 0;
                }
             }
        }

        // General Back command (X button)
        if (direction === 'back' && menu.type !== 'input' && menu.type !== 'info' && menu.type !== 'detail') {
            // Handle Auto Add/Remove warning - go back to Setup
            if (currentState === 'SETUP_AUTO_ADD_REMOVE_WARNING') {
                currentState = 'SETUP';
                selectedIndex = menuData['SETUP'].items.indexOf('Auto Add/Remove');
            }
            // If in vessel configuration, return to vessel setup selection page
            else if (vesselConfigStates.includes(currentState)) {
                // Save current configuration before leaving
                if (menu.type === 'select' && currentState === 'CONFIG_VESSEL_SHAPE') {
                    vesselConfig.shape = menu.items[menu.checked] || vesselConfig.shape;
                } else if (menu.type === 'select' && currentState === 'CONFIG_HOPPER_PRESENT') {
                    vesselConfig.hopperPresent = menu.items[menu.checked] || vesselConfig.hopperPresent;
                } else if (menu.type === 'select' && currentState === 'CONFIG_SMARTBOB_MAX_DROP') {
                    vesselConfig.smartBobMaxDropEnabled = menu.items[menu.checked] || vesselConfig.smartBobMaxDropEnabled;
                }
                // Return to vessel setup selection
                currentState = 'SETUP_VESSEL_SETUP';
                selectedIndex = 0;
                // Set history to just SETUP so back button goes directly to SETUP menu
                history = ['SETUP'];
            } else {
                // Save current state's selectedIndex before going back
                stateIndexMap[currentState] = selectedIndex;
                currentState = history.pop() || 'MAIN_MENU';
                // For specific menus, set default selectedIndex
                if (currentState === 'CONFIG_SMARTBOB_MAX_DROP') {
                    selectedIndex = 1; // Disabled
                } else if (currentState === 'SETUP_SENSOR_TYPE') {
                    selectedIndex = 0; // NCR-80/GWR-2000 (default checked)
                } else if (currentState === 'SETUP_SB485_PROTOCOL') {
                    selectedIndex = 0; // Protocol A
                } else if (currentState === 'SETUP_SB485_TERMINATION') {
                    selectedIndex = 0; // IN
                } else {
                    selectedIndex = stateIndexMap[currentState] || 0;
                }
            }
        }

        renderScreen();
    }

    // Initialize the console
    renderScreen();

    // Keyboard controls for easier testing
    document.addEventListener('keydown', (e) => {
        const tcOverlay = document.getElementById('c100-tutorial-complete-overlay');
        if (tcOverlay && tcOverlay.classList.contains('c100-tutorial-complete--visible')) {
            if (e.key === 'Escape' || e.key === 'Enter') {
                hideC100TutorialCompleteOverlay();
                e.preventDefault();
            }
            return;
        }
        switch (e.key) {
            case 'ArrowUp':
                navigate('up');
                e.preventDefault();
                break;
            case 'ArrowDown':
                navigate('down');
                e.preventDefault();
                break;
            case 'ArrowLeft':
                navigate('left');
                e.preventDefault();
                break;
            case 'ArrowRight':
                navigate('right');
                e.preventDefault();
                break;
            case 'Enter': 
                navigate('select');
                e.preventDefault();
                break;
            case 'Escape': 
            case 'Backspace':
                navigate('back');
                e.preventDefault();
                break;
        }
    });

</script>

</body>
</html>
